<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Nick Severson</title>
<meta name="description" content="Get in touch with Nick Severson.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%231C6B57%22/><text x=%2250%22 y=%2266%22 font-size=%2244%22 font-weight=%22700%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22sans-serif%22>NS</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="wrap nav">
    <a class="wordmark" href="index.html">Nick Severson<span>.</span></a>
    <nav aria-label="Main">
      <button class="menu-btn" aria-expanded="false" aria-controls="navlist" onclick="const u=document.getElementById('navlist');const o=u.classList.toggle('open');this.setAttribute('aria-expanded',o)">Menu</button>
      <ul id="navlist">
        <li><a href="index.html#focus">Focus</a></li>
        <li><a href="index.html#experience">Experience</a></li>
        <li><a href="index.html#writing">Writing</a></li>
        <li><a href="Nick-Severson-Resume.pdf" target="_blank" rel="noopener">Resume</a></li>
        <li><a class="cta" href="contact.html">Get in touch</a></li>
      </ul>
    </nav>
  </div>
</header>

<main>
  <div class="wrap page-hero reveal">
    <p class="eyebrow mono" style="justify-content:center"><span>Contact</span></p>
    <h1>Get in Touch</h1>
    <p class="lede">Have an opportunity or question? Send a message and I'll get back to you directly.</p>
  </div>

  <div class="wrap" style="max-width:640px;padding-bottom:96px">
    <div class="card reveal">
      <form action="https://formsubmit.co/nick.severson@icloud.com" method="POST">
        <!-- FormSubmit configuration -->
        <input type="hidden" name="_subject" value="New message from nickseverson.com">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="https://nickseverson.com/contact-success.html">
        <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off">

        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required placeholder="Jane Doe">
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="jane@company.com">
        </div>

        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" required placeholder="How can I help?"></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Send Message</button>
      </form>
    </div>

    <p class="reveal" style="text-align:center;margin-top:24px">
      <a class="quiet" href="https://linkedin.com/in/nickseverson" target="_blank" rel="noopener">Or connect on LinkedIn</a>
    </p>
  </div>
</main>

<footer class="plain-footer">
  <div class="wrap">
    <span>© <script>document.write(new Date().getFullYear())</script> Nick Severson. All rights reserved.</span>
    <a href="family.html" title="Private family space — coming soon">Family Portal</a>
  </div>
</footer>

<script>
  const io = new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} });
  },{threshold:.12});
  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
</script>

</body>
</html>
