<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get in touch with Nick Severson.">
    <title>Contact | Nick Severson</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%23111827%22/><text x=%2250%22 y=%2266%22 font-size=%2244%22 font-weight=%22700%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22sans-serif%22>NS</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        .heading-font {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-weight: 600;
        }
        input, textarea {
            background-color: rgb(24 24 27);
            border: 1px solid rgb(63 63 70);
            transition: border-color 0.2s ease;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: rgb(161 161 170);
        }
        @media (prefers-reduced-motion: reduce) {
            * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <!-- Navbar -->
    <nav class="border-b border-zinc-800 bg-zinc-950/80 backdrop-blur-lg sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 py-5 flex flex-wrap items-center justify-between gap-y-3">
            <a href="index.html" class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-white rounded-xl flex items-center justify-center">
                    <span class="text-zinc-900 font-bold text-xl">NS</span>
                </div>
                <div>
                    <div class="font-semibold text-xl tracking-tight">Nick Severson</div>
                    <div class="text-xs text-zinc-400 -mt-0.5">Director of Client Strategy</div>
                </div>
            </a>

            <div class="flex items-center gap-x-4">
                <a href="index.html#resume" class="px-5 py-2 text-sm font-medium hover:bg-zinc-900 rounded-2xl transition-colors">
                    Resume
                </a>
                <a href="Nick-Severson-Resume.pdf" download
                   class="px-5 py-2 text-sm font-medium bg-zinc-900 hover:bg-zinc-800 rounded-2xl transition-colors flex items-center gap-x-2">
                    <i class="fa-solid fa-download mr-1"></i>
                    <span>Download Resume</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <div class="max-w-2xl mx-auto px-6 pt-16 pb-10 text-center">
        <h1 class="text-4xl sm:text-5xl font-semibold tracking-tighter heading-font">Get in Touch</h1>
        <p class="mt-4 text-lg text-zinc-400">
            Have an opportunity or question? Send a message and I'll get back to you directly.
        </p>
    </div>

    <!-- Contact Form -->
    <div class="max-w-2xl mx-auto px-6 pb-24">
        <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8 sm:p-10">
            <form action="https://formsubmit.co/nsseverson@gmail.com" method="POST" class="space-y-5">
                <!-- FormSubmit configuration -->
                <input type="hidden" name="_subject" value="New message from nickseverson.com">
                <input type="hidden" name="_template" value="table">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_next" value="https://nickseverson.com/contact-success.html">
                <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off">

                <div>
                    <label for="name" class="block text-sm font-medium text-zinc-300 mb-1.5">Name</label>
                    <input type="text" id="name" name="name" required
                           class="w-full rounded-xl px-4 py-2.5 text-sm text-zinc-100 placeholder-zinc-500"
                           placeholder="Jane Doe">
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-zinc-300 mb-1.5">Email</label>
                    <input type="email" id="email" name="email" required
                           class="w-full rounded-xl px-4 py-2.5 text-sm text-zinc-100 placeholder-zinc-500"
                           placeholder="jane@company.com">
                </div>

                <div>
                    <label for="message" class="block text-sm font-medium text-zinc-300 mb-1.5">Message</label>
                    <textarea id="message" name="message" rows="6" required
                              class="w-full rounded-xl px-4 py-2.5 text-sm text-zinc-100 placeholder-zinc-500 resize-none"
                              placeholder="How can I help?"></textarea>
                </div>

                <button type="submit"
                        class="w-full inline-flex items-center justify-center gap-x-2 bg-white hover:bg-zinc-100 text-zinc-900 font-semibold px-6 py-3.5 rounded-2xl transition-all active:scale-[0.985]">
                    <i class="fa-solid fa-paper-plane"></i>
                    <span>Send Message</span>
                </button>
            </form>
        </div>

        <div class="mt-6 text-center">
            <a href="https://linkedin.com/in/nickseverson" target="_blank" rel="noopener"
               class="inline-flex items-center gap-x-2 text-sm text-zinc-400 hover:text-white transition-colors">
                <i class="fa-brands fa-linkedin w-4"></i>
                <span>Or connect on LinkedIn</span>
            </a>
        </div>
    </div>

    <!-- Footer -->
    <footer class="border-t border-zinc-800">
        <div class="max-w-5xl mx-auto px-6 py-8 text-center text-xs text-zinc-500">
            &copy; <span id="year"></span> Nick Severson. All rights reserved.
        </div>
    </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
